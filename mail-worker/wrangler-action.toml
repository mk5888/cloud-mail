name = "cloudmail"			# 与线上已存在的 Worker 同名，部署时更新现有 Worker（保留域名/路由/邮件路由/已有变量）
main = "src/index.js"
compatibility_date = "2025-04-09"
keep_vars = true

[observability]
enabled = true

[[d1_databases]]
binding = "db"
database_name = "email"		# 数据库的名称
database_id = "2027b1fb-7dc1-4e8a-a452-540390db482f"	# 可被 GitHub Secret D1_DATABASE_ID 覆盖

[[kv_namespaces]]
binding = "kv"
id = "8433e5042f274023bfd4495d7a3ca3dd"	# 可被 GitHub Secret KV_NAMESPACE_ID 覆盖

[[r2_buckets]]
binding = "r2"
bucket_name = "email"		# 可被 GitHub Secret R2_BUCKET_NAME 覆盖

[assets]
binding = "assets"		#静态资源绑定名默认不可修改
directory = "./dist"	#前端vue项目打包的静态资源存放位置,默认dist
not_found_handling = "single-page-application"
run_worker_first = true

[triggers]
crons = ["0 16 * * *"]	#定时任务每天晚上12点执行
