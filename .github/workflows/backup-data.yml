name: 💾 Backup Cloudflare data (D1 / KV / R2)

on:
  schedule:
    - cron: "30 17 * * *"   # 每天 UTC 17:30（台北时间 01:30）自动备份
  workflow_dispatch:

jobs:
  backup:
    name: 📦 Export and upload backup
    runs-on: ubuntu-latest

    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      D1_DATABASE_NAME: email                                # D1 数据库名称
      KV_NAMESPACE_ID: 8433e5042f274023bfd4495d7a3ca3dd      # KV 命名空间 ID
      R2_DATA_BUCKET: email                                  # 存放邮件附件的 R2 桶
      BACKUP_BUCKET: cloud-mail-backup                       # 备份文件上传到这个 R2 桶

    steps:
      - name: ➡️ Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "./mail-worker/package-lock.json"

      - name: 📥 Install wrangler
        run: npm ci
        working-directory: ./mail-worker

      - name: 🔑 Check Cloudflare credentials
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "❌ CLOUDFLARE_API_TOKEN / CLOUDFLARE_ACCOUNT_ID secrets are not set. Cannot back up."
            exit 1
          fi

      - name: 🗂️ Prepare backup directory
        run: |
          STAMP=$(date -u +%Y%m%d-%H%M%S)
          echo "STAMP=$STAMP" >> $GITHUB_ENV
          echo "BACKUP_DIR=$RUNNER_TEMP/backup-$STAMP" >> $GITHUB_ENV
          mkdir -p "$RUNNER_TEMP/backup-$STAMP"

      - name: 🗄️ Export D1 database
        working-directory: ./mail-worker
        run: |
          echo "Exporting D1 database '$D1_DATABASE_NAME'..."
          npx wrangler d1 export "$D1_DATABASE_NAME" --remote --output "$BACKUP_DIR/d1-$D1_DATABASE_NAME.sql"
          ls -lh "$BACKUP_DIR/d1-$D1_DATABASE_NAME.sql"

      - name: 🔑 Export KV namespace
        continue-on-error: true
        working-directory: ./mail-worker
        run: |
          mkdir -p "$BACKUP_DIR/kv/values"
          npx wrangler kv key list --namespace-id "$KV_NAMESPACE_ID" --remote > "$BACKUP_DIR/kv/keys.json"
          COUNT=$(jq length "$BACKUP_DIR/kv/keys.json")
          echo "KV keys to back up: $COUNT"
          i=0
          jq -r '.[].name' "$BACKUP_DIR/kv/keys.json" | while IFS= read -r key; do
            i=$((i+1))
            idx=$(printf '%06d' "$i")
            npx wrangler kv key get "$key" --namespace-id "$KV_NAMESPACE_ID" --remote > "$BACKUP_DIR/kv/values/$idx.val" || echo "⚠️ failed to get key: $key"
            printf '%s\t%s\n' "$idx" "$key" >> "$BACKUP_DIR/kv/index.tsv"
          done
          echo "✅ KV export complete."

      - name: 📎 Export R2 objects (attachments)
        continue-on-error: true
        working-directory: ./mail-worker
        run: |
          mkdir -p "$BACKUP_DIR/r2"
          KEYS_FILE="$RUNNER_TEMP/r2-keys.txt"
          : > "$KEYS_FILE"
          CURSOR=""
          while :; do
            URL="https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/r2/buckets/${R2_DATA_BUCKET}/objects?per_page=500"
            if [ -n "$CURSOR" ]; then URL="$URL&cursor=$CURSOR"; fi
            RESP=$(curl -s -H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" "$URL")
            echo "$RESP" | jq -r '.result[]?.key' >> "$KEYS_FILE"
            TRUNC=$(echo "$RESP" | jq -r '.result_info.is_truncated // false')
            CURSOR=$(echo "$RESP" | jq -r '.result_info.cursor // empty')
            if [ "$TRUNC" != "true" ] || [ -z "$CURSOR" ]; then break; fi
          done
          echo "R2 objects to back up: $(wc -l < "$KEYS_FILE")"
          while IFS= read -r key; do
            [ -z "$key" ] && continue
            mkdir -p "$BACKUP_DIR/r2/$(dirname "$key")"
            npx wrangler r2 object get "${R2_DATA_BUCKET}/${key}" --file "$BACKUP_DIR/r2/$key" --remote || echo "⚠️ failed to get object: $key"
          done < "$KEYS_FILE"
          echo "✅ R2 export complete."

      - name: 🗜️ Create archive
        run: |
          tar -czf "$RUNNER_TEMP/cloud-mail-backup-$STAMP.tar.gz" -C "$BACKUP_DIR" .
          ls -lh "$RUNNER_TEMP/cloud-mail-backup-$STAMP.tar.gz"

      - name: ☁️ Upload backup to R2
        working-directory: ./mail-worker
        run: |
          npx wrangler r2 object put "${BACKUP_BUCKET}/${STAMP}/cloud-mail-backup-${STAMP}.tar.gz" \
            --file "$RUNNER_TEMP/cloud-mail-backup-$STAMP.tar.gz" --remote
          echo "✅ Backup uploaded to r2://${BACKUP_BUCKET}/${STAMP}/cloud-mail-backup-${STAMP}.tar.gz"

      - name: 📤 Upload backup as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloud-mail-backup-${{ env.STAMP }}
          path: ${{ runner.temp }}/cloud-mail-backup-${{ env.STAMP }}.tar.gz
          retention-days: 14
